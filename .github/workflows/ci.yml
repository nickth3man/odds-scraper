name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Quality gate: lint + format (~20s) ──────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── Fast type check (ty) — non-blocking while tool is experimental ──
  typecheck-ty:
    name: Type Check (ty) ⚡
    needs: quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
      - run: uv run ty check

  # ── Thorough type check (pyright) ──────────────────────────
  typecheck-pyright:
    name: Type Check (pyright)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
      - run: uv run pyright

  # ── Security audit ─────────────────────────────────────────
  security:
    name: Security Audit
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit --desc --progress-spinner off

  # ── Dependency review (PRs only, independent of quality gate) ──
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # ── Tests with coverage ────────────────────────────────────
  test:
    name: Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          include-hidden-files: true
