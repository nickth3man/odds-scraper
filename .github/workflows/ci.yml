name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'
  UV_FROZEN: '1'
  UV_LINK_MODE: copy

jobs:
  quality:
    name: Lint, format, and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Ruff format check
        run: uv run --frozen ruff format --check .

      - name: Ruff lint
        run: uv run --frozen ruff check --output-format=github .

      - name: Verify package builds
        run: uv build

  typecheck:
    name: Type checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: ty check (advisory while ty is still stabilizing)
        continue-on-error: true
        run: uv run --frozen ty check

      - name: pyright check (blocking)
        run: uv run --frozen pyright

  tests:
    name: Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: py${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Install Playwright browsers when present
        run: |
          if uv run --frozen python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('playwright') else 1)"; then
            uv run --frozen playwright install --with-deps chromium
          else
            echo 'Playwright is not installed; skipping browser setup.'
          fi

      - name: Run tests with coverage gate
        env:
          ODDS_SCRAPER_OFFLINE_TESTS: '1'
        run: |
          uv run --frozen pytest \
            --cov=src \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          config-file: .github/dependency-review-config.yml

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: pip-audit
        run: uv run --frozen pip-audit --strict

  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, typecheck, tests, dependency-review, audit]
    permissions: {}
    steps:
      - name: Fail if any required job failed
        run: |
          required='${{ toJSON(needs) }}'
          echo "$required"
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ['NEEDS_JSON'])
          allowed_skips = {'dependency-review'}
          failures = []

          for name, data in needs.items():
              result = data['result']
              if result == 'success':
                  continue
              if result == 'skipped' and name in allowed_skips:
                  continue
              failures.append(f'{name}: {result}')

          if failures:
              print('Required CI jobs failed:')
              print('\n'.join(failures))
              sys.exit(1)
          PY
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
