name: Compatibility

on:
  schedule:
    - cron: '18 9 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'
  UV_FROZEN: '1'
  UV_LINK_MODE: copy

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Install Playwright browsers
        run: |
          if uv run --frozen python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('playwright') else 1)"; then
            if [ "${{ runner.os }}" = "Linux" ]; then
              uv run --frozen playwright install --with-deps chromium
            else
              uv run --frozen playwright install chromium
            fi
          fi

      - name: Run smoke tests
        env:
          ODDS_SCRAPER_OFFLINE_TESTS: '1'
        run: uv run --frozen pytest -q --tb=short
