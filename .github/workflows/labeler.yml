name: Pull request labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels by changed files
    runs-on: ubuntu-latest
    steps:
      - name: Label pull request
        uses: actions/labeler@v6
        with:
          repo-token: ${{ github.token }}
          sync-labels: true
