name: Security

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/dependency-review-config.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
      - 'tests/**'
  schedule:
    - cron: '37 8 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'
  UV_FROZEN: '1'

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Audit installed dependencies
        run: uv run --frozen pip-audit --strict

  workflow-security:
    name: zizmor GitHub Actions scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Scan workflows with zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: uvx zizmor --format=github --min-severity=medium .

  secret-scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for committed secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            detect --source=/repo --redact --verbose

  scorecard:
    name: OSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard SARIF
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif

      - name: Upload Scorecard artifact
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          if-no-files-found: ignore
          retention-days: 14
