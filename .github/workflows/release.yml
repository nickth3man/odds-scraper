name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'
  UV_FROZEN: '1'
  UV_LINK_MODE: copy

jobs:
  release:
    name: Build, attest, and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          tag = os.environ['GITHUB_REF_NAME'].removeprefix('v')
          version = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']
          if tag != version:
              print(f'Tag v{tag} does not match pyproject.toml version {version}.')
              sys.exit(1)
          PY

      - name: Run release checks
        run: |
          uv run --frozen ruff format --check .
          uv run --frozen ruff check --output-format=github .
          uv run --frozen pyright
          if uv run --frozen python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('playwright') else 1)"; then
            uv run --frozen playwright install --with-deps chromium
          fi
          ODDS_SCRAPER_OFFLINE_TESTS=1 uv run --frozen pytest

      - name: Build distributions
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
