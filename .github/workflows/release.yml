name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'
  UV_FROZEN: '1'
  UV_LINK_MODE: copy

jobs:
  release:
    name: Build, attest, and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          tag = os.environ['GITHUB_REF_NAME'].removeprefix('v')
          version = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']
          if tag != version:
              print(f'Tag v{tag} does not match pyproject.toml version {version}.')
              sys.exit(1)
          PY

      - name: Run release checks
        run: |
          uv run --frozen ruff format --check .
          uv run --frozen ruff check --output-format=github .
          uv run --frozen pyright
          uv run --frozen pytest --cov=src --cov-fail-under=80

      - name: Build distributions
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
