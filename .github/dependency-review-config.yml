# Used by actions/dependency-review-action in CI.
# Keep this strict enough to block known bad updates without blocking normal OSS usage.
fail-on-severity: moderate
fail-on-scopes:
  - runtime
  - development

# GPL-family licenses are often incompatible with permissive or closed distribution.
# Remove or soften this list if the project intentionally accepts copyleft deps.
deny-licenses:
  - AGPL-1.0
  - AGPL-3.0
  - GPL-2.0
  - GPL-3.0
