name: Bug report
description: Report a reproducible issue.
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid sharing sportsbook account data, cookies, tokens, or private location details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the smallest command or UI path that reproduces the issue.
      placeholder: |
        1. Run `uv sync --locked --group dev`
        2. Run `uv run python -m frontend.gui.main`
        3. Open http://localhost:8080/odds
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ESPN scraper
        - DraftKings scraper
        - HTTP client / retries / rate limiting
        - EV calculator
        - NiceGUI dashboard
        - Packaging / CI
        - Documentation
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: '3.12.9'
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS 15, Ubuntu 24.04, Windows 11'
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs without cookies, tokens, headers, or account identifiers.
      render: text
