name: Feature request
description: Suggest a project improvement.
title: '[Feature]: '
labels: ['enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or UX change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ESPN scraper
        - DraftKings scraper
        - HTTP client / retries / rate limiting
        - EV calculator
        - NBA data/modeling / backtesting
        - NiceGUI dashboard
        - Packaging / CI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Offline tests cover the new behavior.
        - CI passes with 80% coverage.
        - UI changes include a screenshot or short note in the PR.
