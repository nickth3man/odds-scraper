language: en-US
early_access: true

tone_instructions: >-
  Be direct and specific. Prioritize correctness, tests, Python 3.12 typing, and maintainable
  architecture over Ruff-covered style. Flag bare HTTP clients, print(), and missing future annotations.

reviews:
  profile: assertive
  abort_on_close: true
  suggested_labels: true
  auto_apply_labels: true
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai summary'
  review_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    base_branches:
      - main
  path_filters:
    - '!raw/**'
    - '!data/**'
    - '!htmlcov/**'
    - '!reference/**'
    - '!**/*.sqlite'
    - '!**/*.db'
    - '!**/*.parquet'
    - '!**/*.csv'
    - '!**/*.png'
    - '!**/*.jpg'
    - '!**/*.jpeg'
    - '!**/*.gif'
    - '!**/*.webp'
  path_instructions:
    - path: 'src/backend/scrapers/draftkings/**'
      instructions: >-
        Review Playwright scraper logic. Verify that Playwright sessions always use try/finally 
        with `_cleanup(session)`. Ensure new parsers contribute to the fallback chain. Check that 
        selectors use `class*=` partial matching for stability, not exact class strings. Verify 
        stealth evasion and anti-detection args are present.
    - path: 'src/backend/scrapers/shared/**'
      instructions: >-
        Review HTTP client and parser logic. Ensure `get_json()` gracefully handles `curl_cffi` 
        absence when `impersonate=` is used. Verify rate-limiting (`courlan`) is applied before 
        HTTP requests and User-Agent rotation occurs on every request. Check that TypedDict 
        schemas (e.g., `GameOdds`) are consistently applied.
    - path: 'src/backend/scrapers/espn/**'
      instructions: >-
        Review ESPN JSON API scraper logic. Ensure graceful fallback from header API to scoreboard API.
        Verify error handling is robust (broad except blocks for per-event parsing are intentional 
        and defensive).
    - path: 'src/backend/models/**'
      instructions: >-
        Review domain models, EV calculation, de-vigging, and odds-row enrichment logic. Flag potential
        division by zero in EV calculations and invalid odds handling. Verify Kelly criterion remains capped
        at 5% for bankroll safety. Bets with unavailable or invalid true probability data should be dropped,
        not guessed via manual/default fallback probabilities.
    - path: 'src/backend/data/**'
      instructions: >-
        Review NBA historical modeling and backtesting code. Verify rolling features are leak-free using
        prior games only (`shift(1)` or equivalent), temporal splits are chronological, and market baselines
        use de-vigged probabilities. Flag random train/test splits, current-game stats in pre-game features,
        unparameterized SQL, use of closing odds as if available at opening bet time, and accuracy-only model
        evaluation. Ensure raw/nba data and generated model artifacts are not committed.
    - path: 'src/backend/enrichment/**'
      instructions: >-
        Review enrichment and caching logic. Verify `TTLCache` is used for all NBA API calls. 
        Check that probability models are bounded to [0.01, 0.99]. Ensure team name matching 
        handles tricode and substring fallbacks.
    - path: 'src/frontend/gui/**'
      instructions: >-
        Focus on NiceGUI UX and event loops. CRITICAL: Flag any synchronous blocking call inside 
        an async handler; they MUST use `await run.io_bound(...)`. Verify UI state is managed safely 
        (e.g., button disable/enable in try/finally blocks). Ensure Quasar template strings are valid.
    - path: 'tests/**'
      instructions: >-
        Review testing conventions. CRITICAL: Reject tests that call `sync_playwright().start()` 
        or hit live URLs. Enforce use of `FakeElement`/`FakePage` from `tests/browser_fakes.py` 
        and local fixtures (`src/backend/fixtures/`). Verify `monkeypatch` is used to prevent live network calls.
        Data/model tests may use small synthetic SQLite fixtures, but must not require the large `raw/` dataset.
    - path: '.github/workflows/**'
      instructions: >-
        Review GitHub Actions. Check for `persist-credentials: false` on checkouts. Ensure 
        `uv sync --group dev` consistency and that artifact uploads use pinned SHAs. Verify 
        matrix covers Python 3.12 and 3.13.
    - path: 'pyproject.toml'
      instructions: >-
        Review dependency changes. Flag any new dependencies that are paid SaaS products, databases, 
        or unnecessarily bloat the package. Ensure strict version constraints are reasonable.
  tools:
    semgrep:
      enabled: true
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    github-checks:
      enabled: true
    actionlint:
      enabled: true
    gitleaks:
      enabled: true
    osvScanner:
      enabled: true
    languagetool:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  code_guidelines:
    enabled: true
    filePatterns:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**/*.md'

code_generation:
  docstrings:
    language: en-US
  unit_tests:
    path: tests

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
  auto_planning: true
  labeling:
    enabled: true
